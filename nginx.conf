# Nginx配置 for Tomorrow.AI
# 将此配置复制到 /etc/nginx/sites-available/twbt.top

server {
    listen 80;
    server_name twbt.top www.twbt.top;
    
    # 重定向到HTTPS
    return 301 https://$server_name$request_uri;
}

server {
    listen 443 ssl http2;
    server_name twbt.top www.twbt.top;
    client_max_body_size 200m;

    # SSL证书配置（请替换为实际路径）
    # ssl_certificate /path/to/your/certificate.crt;
    # ssl_certificate_key /path/to/your/private.key;

    # 启用Gzip压缩
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/json
        application/javascript
        application/xml+rss
        application/atom+xml
        image/svg+xml
        font/woff
        font/woff2;

    # 静态资源缓存
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        add_header Vary "Accept-Encoding";
        
        # 尝试从dist目录提供文件
        root /var/www/twbt.top/dist;
        try_files $uri $uri/ =404;
    }

    # HTML文件不缓存（确保更新及时生效）
    location ~* \.html$ {
        expires -1;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
        
        root /var/www/twbt.top/dist;
        try_files $uri $uri/ =404;
    }

    # 前端静态文件
    location / {
        root /var/www/twbt.top/dist;
        index index.html;
        try_files $uri $uri/ /index.html;
        
        # 通用缓存策略
        expires 1h;
        add_header Cache-Control "public, must-revalidate";
    }

    # API代理到Node.js后端
    location /api/ {
        proxy_pass http://localhost:3001;
        proxy_request_buffering off;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        
        # API响应不缓存
        expires -1;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }

    # WebSocket支持
    location /ws {
        proxy_pass http://localhost:3001;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # 多文件项目静态资源（代理到后端，由后端处理注入）
    location /projects/ {
        proxy_pass http://localhost:3001;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;

        # Cache project assets aggressively while keeping HTML fresh.
        # The backend also emits cache headers for non-HTML resources.
        proxy_cache_valid 200 1d;
        
        # 允许跨域访问（用于iframe加载）
        add_header Access-Control-Allow-Origin "*" always;
        add_header Access-Control-Allow-Methods "GET, OPTIONS" always;
    }

    # 安全头部
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # 日志配置
    access_log /var/log/nginx/twbt.top.access.log;
    error_log /var/log/nginx/twbt.top.error.log;
}
